name: 'Slack Release Notify'
description: 'Post release start, success, or failure notifications to Slack'

# Required caller permissions:
#   actions: read   — for workflow run duration (gh api actions/runs/{id})
#   contents: read  — for checking if the release exists (gh release view)
# Required bot scopes:
#   chat:write

inputs:
  slack-bot-token:
    description: 'Slack bot token (xoxb-...). Needs chat:write scope.'
    required: true
  slack-channel-id:
    description: 'Slack channel ID (e.g. C0123456789)'
    required: true
  stage:
    description: 'Which stage to notify: start or finish'
    required: true
  status:
    description: 'Pipeline status for finish stage: success or failure (ignored for start)'
    required: false
    default: 'success'
  version:
    description: 'Release version/tag (defaults to github.ref_name)'
    required: false
    default: ${{ github.ref_name }}
  github-token:
    description: 'Token for reading workflow run metadata (defaults to github.token)'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        case "${{ inputs.stage }}" in
          start|finish) ;;
          *)
            echo "Invalid 'stage' input: '${{ inputs.stage }}'. Must be 'start' or 'finish'." >&2
            exit 1
            ;;
        esac

        if [ "${{ inputs.stage }}" = "finish" ]; then
          case "${{ inputs.status }}" in
            success|failure) ;;
            *)
              echo "Invalid 'status' input: '${{ inputs.status }}'. Must be 'success' or 'failure' when stage=finish." >&2
              exit 1
              ;;
          esac
        fi

    - name: Checkout (shallow, for git metadata)
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Gather metadata
      id: meta
      shell: bash
      run: |
        {
          echo "sha_short=$(git rev-parse --short HEAD)"
          echo "commit_subject=$(git log -1 --pretty=%s)"
          echo "repo_url=${{ github.server_url }}/${{ github.repository }}"
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "compare_url=${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.version }}"
        } >> "$GITHUB_OUTPUT"

    # ─── START ───
    - name: Post start message
      if: inputs.stage == 'start'
      uses: slackapi/slack-github-action@v3.0.1
      with:
        method: chat.postMessage
        token: ${{ inputs.slack-bot-token }}
        payload: |
          channel: ${{ inputs.slack-channel-id }}
          text: ":rocket: Release ${{ inputs.version }} started"
          blocks:
            - type: header
              text:
                type: plain_text
                text: "🚀 Release ${{ inputs.version }} — in progress"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Repo*\n<${{ steps.meta.outputs.repo_url }}|${{ github.repository }}>"
                - type: mrkdwn
                  text: "*Tag*\n`${{ inputs.version }}`"
                - type: mrkdwn
                  text: "*Commit*\n<${{ steps.meta.outputs.repo_url }}/commit/${{ github.sha }}|`${{ steps.meta.outputs.sha_short }}`> ${{ steps.meta.outputs.commit_subject }}"
                - type: mrkdwn
                  text: "*Triggered by*\n<https://github.com/${{ github.actor }}|@${{ github.actor }}>"
            - type: context
              elements:
                - type: mrkdwn
                  text: "<${{ steps.meta.outputs.run_url }}|View workflow run>"

    # ─── FINISH ───
    - name: Compute duration from workflow run
      id: duration
      if: inputs.stage == 'finish'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if run_started_at=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.run_started_at' 2>/dev/null); then
          :
        else
          echo "::warning title=slack-release-notify::Could not fetch workflow run metadata — duration will show as 'unknown'. Add 'actions: read' to the job's permissions block."
          run_started_at=""
        fi

        if [[ ! "$run_started_at" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T ]]; then
          echo "pretty=unknown" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        start_epoch=$(date -d "$run_started_at" +%s)
        end_epoch=$(date +%s)
        elapsed=$(( end_epoch - start_epoch ))

        if [ $elapsed -lt 60 ]; then
          echo "pretty=${elapsed}s" >> "$GITHUB_OUTPUT"
        else
          echo "pretty=$((elapsed / 60))m $((elapsed % 60))s" >> "$GITHUB_OUTPUT"
        fi

    - name: Check release exists
      id: release_check
      if: inputs.stage == 'finish' && inputs.status == 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if gh release view "${{ inputs.version }}" --json url --jq '.url' >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=slack-release-notify::Release '${{ inputs.version }}' not found — tag link and 'View release notes' link will be omitted."
        fi

    - name: Build success message pieces
      id: success_pieces
      if: inputs.stage == 'finish' && inputs.status == 'success'
      shell: bash
      run: |
        # Tag field: link to release page only if it exists
        if [ "${{ steps.release_check.outputs.exists }}" = "true" ]; then
          tag_field="*Tag*\n<${{ steps.meta.outputs.compare_url }}|${{ inputs.version }}>"
        else
          tag_field="*Tag*\n\`${{ inputs.version }}\`"
        fi

        # Footer: append release link only if release exists
        footer="By <https://github.com/${{ github.actor }}|@${{ github.actor }}> • <${{ steps.meta.outputs.run_url }}|View run logs> 🔍"
        if [ "${{ steps.release_check.outputs.exists }}" = "true" ]; then
          footer="$footer • <${{ steps.meta.outputs.compare_url }}|View release notes> 📝"
        fi

        {
          echo "tag_field<<TAG_EOF"
          printf '%s\n' "$tag_field"
          echo "TAG_EOF"
          echo "footer<<FOOTER_EOF"
          echo "$footer"
          echo "FOOTER_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Post finish message — succeeded
      if: inputs.stage == 'finish' && inputs.status == 'success'
      uses: slackapi/slack-github-action@v3.0.1
      with:
        method: chat.postMessage
        token: ${{ inputs.slack-bot-token }}
        payload: |
          channel: ${{ inputs.slack-channel-id }}
          text: ":white_check_mark: Release ${{ inputs.version }} succeeded"
          blocks:
            - type: header
              text:
                type: plain_text
                text: "✅ Release ${{ inputs.version }} — succeeded"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Repo*\n<${{ steps.meta.outputs.repo_url }}|${{ github.repository }}>"
                - type: mrkdwn
                  text: "${{ steps.success_pieces.outputs.tag_field }}"
                - type: mrkdwn
                  text: "*Commit*\n<${{ steps.meta.outputs.repo_url }}/commit/${{ github.sha }}|`${{ steps.meta.outputs.sha_short }}`> ${{ steps.meta.outputs.commit_subject }}"
                - type: mrkdwn
                  text: "*Duration*\n${{ steps.duration.outputs.pretty }}"
            - type: context
              elements:
                - type: mrkdwn
                  text: "${{ steps.success_pieces.outputs.footer }}"

    - name: Post finish message — failed
      if: inputs.stage == 'finish' && inputs.status == 'failure'
      uses: slackapi/slack-github-action@v3.0.1
      with:
        method: chat.postMessage
        token: ${{ inputs.slack-bot-token }}
        payload: |
          channel: ${{ inputs.slack-channel-id }}
          text: ":x: Release ${{ inputs.version }} failed"
          blocks:
            - type: header
              text:
                type: plain_text
                text: "❌ Release ${{ inputs.version }} — failed"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Repo*\n<${{ steps.meta.outputs.repo_url }}|${{ github.repository }}>"
                - type: mrkdwn
                  text: "*Tag*\n`${{ inputs.version }}` (<${{ steps.meta.outputs.repo_url }}/commit/${{ github.sha }}|view commit>)"
                - type: mrkdwn
                  text: "*Commit*\n<${{ steps.meta.outputs.repo_url }}/commit/${{ github.sha }}|`${{ steps.meta.outputs.sha_short }}`> ${{ steps.meta.outputs.commit_subject }}"
                - type: mrkdwn
                  text: "*Failed after*\n${{ steps.duration.outputs.pretty }}"
            - type: context
              elements:
                - type: mrkdwn
                  text: "By <https://github.com/${{ github.actor }}|@${{ github.actor }}> • <${{ steps.meta.outputs.run_url }}|View run logs> 🔍"
